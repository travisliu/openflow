defaultProvider: mock
concurrency: 2
timeoutMs: 30000

providers:
  mock:
    command: mock
    responses:
      default:
        text: "mock response"
      review-auth:
        json:
          findings: []
      summary:
        text: "summary response"
      failure:
        exitCode: 1
        stderr: "configured mock failure"
      review-fail:
        exitCode: 1
        stderr: "mock agent failure"
      schema-fail:
        json:
          wrongField: true
      invalid-schema:
        json:
          wrongField: true
      verbose-review:
        json:
          summary: "Review complete for SECRET_FROM_ENV"
        stdout: "mock stdout SECRET_FROM_ENV"
        stderr: "mock stderr SECRET_FROM_ENV"
      verbose-timeout:
        delayMs: 1000
        timeout: true
        stdout: "partial stdout"
        stderr: "partial stderr"

security:
  passEnv: []
  redactEnv:
    - OPENAI_API_KEY
    - GEMINI_API_KEY
    - GOOGLE_API_KEY
    - "*_TOKEN"
    - "*_SECRET"
